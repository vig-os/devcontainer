# TEMPORARY spike workflow for #992 — DELETE before merge.
#
# Goal: determine whether a single workflow can conditionally run a job in a
# container OR on the host runner, driven by a preceding job's output
# ("Option A" of epic #988), including across a `workflow_call` boundary.
#
# Cases (each prints hostname / id -u / HOME / os-release as evidence):
#   1  empty image, no credentials      -> host or error?
#   2  empty image, WITH credentials    -> host or error?
#   3  non-empty image                  -> container (baseline)
#   4a reusable workflow, empty image   -> host across workflow_call?
#   4b reusable workflow, non-empty     -> container across workflow_call?
#   5  conditional container MAP (expr) -> can the whole map be an expression?
name: spike-992-conditional-container

on:  # yamllint disable-line rule:truthy
  pull_request:

permissions:
  contents: read

jobs:
  resolve:
    name: resolve-toolchain (fan-in source)
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      empty: ${{ steps.set.outputs.empty }}
      image: ${{ steps.set.outputs.image }}
    steps:
      - name: Set outputs
        id: set
        run: |
          # Emulates a resolve-toolchain job: empty image in host modes,
          # a real image in container mode.
          {
            echo "empty="
            echo "image=ubuntu:24.04"
          } >> "$GITHUB_OUTPUT"

  case1-empty-host:
    name: "Case 1 — empty image, no credentials"
    needs: [resolve]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    container:
      image: ${{ needs.resolve.outputs.empty }}
    steps:
      - name: Evidence
        run: |
          echo "== Case 1: empty image, no credentials =="
          echo "hostname : $(hostname)"
          echo "id -u    : $(id -u)"
          echo "HOME     : ${HOME}"
          echo "--- /etc/os-release ---"
          head -3 /etc/os-release

  case2-empty-credentials:
    name: "Case 2 — empty image WITH credentials"
    needs: [resolve]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    container:
      image: ${{ needs.resolve.outputs.empty }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    steps:
      - name: Evidence
        run: |
          echo "== Case 2: empty image WITH credentials =="
          echo "hostname : $(hostname)"
          echo "id -u    : $(id -u)"
          echo "HOME     : ${HOME}"
          echo "--- /etc/os-release ---"
          head -3 /etc/os-release

  case3-nonempty-container:
    name: "Case 3 — non-empty image (container baseline)"
    needs: [resolve]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    container:
      image: ${{ needs.resolve.outputs.image }}
    steps:
      - name: Evidence
        run: |
          echo "== Case 3: non-empty image =="
          echo "hostname : $(hostname)"
          echo "id -u    : $(id -u)"
          echo "HOME     : ${HOME}"
          echo "--- /etc/os-release ---"
          head -3 /etc/os-release

  case4a-reusable-empty:
    name: "Case 4a — reusable workflow, empty image"
    needs: [resolve]
    uses: ./.github/workflows/spike-992-reusable.yml
    with:
      image: ${{ needs.resolve.outputs.empty }}
      label: empty

  case4b-reusable-nonempty:
    name: "Case 4b — reusable workflow, non-empty image"
    needs: [resolve]
    uses: ./.github/workflows/spike-992-reusable.yml
    with:
      image: ${{ needs.resolve.outputs.image }}
      label: nonempty

  case5-conditional-map:
    name: "Case 5 — conditional container MAP via expression"
    needs: [resolve]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # Alternative mechanism: make the whole `container:` value an expression
    # that yields a map when an image is set, or null (=> host) when empty.
    container: ${{ needs.resolve.outputs.empty != '' && fromJSON(format('{{"image":"{0}"}}', needs.resolve.outputs.empty)) || null }}
    steps:
      - name: Evidence
        run: |
          echo "== Case 5: conditional container map (expression) =="
          echo "hostname : $(hostname)"
          echo "id -u    : $(id -u)"
          echo "HOME     : ${HOME}"
          echo "--- /etc/os-release ---"
          head -3 /etc/os-release
