# TEMPORARY spike workflow for #992 — DELETE before merge.
# Reusable (workflow_call) leg: proves the conditional-container pattern
# survives a `workflow_call` boundary with the image threaded in via inputs.
name: spike-992-reusable

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      image:
        description: Container image; empty string means run on the host runner.
        type: string
        required: false
        default: ""
      label:
        description: Human label for the evidence block.
        type: string
        required: false
        default: "reusable"

permissions:
  contents: read

jobs:
  run:
    name: reusable ${{ inputs.label }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    container:
      image: ${{ inputs.image }}
    steps:
      - name: Evidence
        run: |
          echo "== REUSABLE case: label='${{ inputs.label }}' image='${{ inputs.image }}' =="
          echo "hostname : $(hostname)"
          echo "id -u    : $(id -u)"
          echo "HOME     : ${HOME}"
          if [ -r /etc/os-release ]; then
            echo "--- /etc/os-release ---"
            head -3 /etc/os-release
          fi
