# NVD Feed Mirror Refresh
#
# Self-hosted mirror of the NVD 2.0 JSON data feeds that vulnix consumes.
# nvd.nist.gov is chronically throttled/unstable (nix-community/vulnix#171):
# cold scan runs crawl the full year-feed set for tens of minutes and fail with
# ReadTimeoutError / IncompleteRead. This workflow is the ONLY job that talks to
# nvd.nist.gov — it downloads the feed files with resumable retry, validates
# them, and republishes them as assets on the `nvd-mirror` release. The vulnix
# scans (security-scan.yml, release.yml) then fetch from this mirror via
# `--mirror`, so a NVD outage can no longer break a scan or a release.
#
# The mirror is an abstraction layer: if NVD ever changes/retires the 2.0 feed
# files, only this job's source changes — vulnix keeps consuming identical
# `nvdcve-2.0-<name>.json.gz` files from the mirror.
#
# Refs: #870
name: NVD Mirror Refresh

on:  # yamllint disable-line rule:truthy
  schedule:
    # Every 6 hours, offset off the top of the hour. The upstream `modified`
    # feed refreshes ~hourly; 6 h keeps the mirror fresh enough for a CVE gate
    # while staying light on nvd.nist.gov. Scheduled runs execute on the default
    # branch, so the mirror auto-refreshes once this lands on `main`.
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # upload assets to the nvd-mirror release

concurrency:
  group: nvd-mirror-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh NVD feed mirror
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      # vulnix (1.12.4) fetches nvdcve-2.0-<name>.json.gz for a rolling 6-year
      # window plus `modified` from this base; the mirror must serve the same
      # names so `vulnix --mirror <release>/` resolves each file.
      NVD_FEED_BASE: https://nvd.nist.gov/feeds/json/cve/2.0
    steps:
      - name: Download NVD feeds (resumable, retrying)
        # curl -C - resumes this run's own partial file across --retry attempts
        # (the feeds are full snapshots, so cross-run resume is intentionally NOT
        # used — a stale cached file cannot be safely appended to). set -e +
        # `gzip -t` means a truncated/short download fails the step, so the
        # publish step below never ships a partial or corrupt feed set.
        run: |
          set -euo pipefail
          mkdir -p mirror
          names=(modified)
          year="$(date -u +%Y)"
          for y in $(seq "$((year - 5))" "$year"); do names+=("$y"); done
          for n in "${names[@]}"; do
            f="nvdcve-2.0-${n}.json.gz"
            echo "::group::fetch ${f}"
            curl -fSL --retry 8 --retry-all-errors --retry-delay 15 \
                 --retry-max-time 600 -C - -o "mirror/${f}" "${NVD_FEED_BASE}/${f}"
            gzip -t "mirror/${f}"
            echo "::endgroup::"
          done
          ls -lh mirror

      - name: Publish feeds to the nvd-mirror release
        # Reached only if every feed downloaded and passed `gzip -t`, so the
        # mirror is never clobbered with a partial set: a stale-but-complete
        # mirror always beats a fresh-but-broken one. The release is a data
        # bucket, not a version release — kept out of "latest" and marked
        # prerelease so release tooling ignores it. No workflow triggers on
        # release events (verified), so republishing fires nothing.
        run: |
          set -euo pipefail
          gh release view nvd-mirror >/dev/null 2>&1 || \
            gh release create nvd-mirror \
              --title "NVD feed mirror (automated)" \
              --notes "Automated mirror of the NVD 2.0 JSON feeds consumed by vulnix (#870). Managed by nvd-mirror-refresh.yml — do not edit or delete manually." \
              --latest=false --prerelease
          gh release upload nvd-mirror mirror/nvdcve-2.0-*.json.gz --clobber
