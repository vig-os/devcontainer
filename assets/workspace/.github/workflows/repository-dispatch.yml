name: Repository Dispatch

on:  # yamllint disable-line rule:truthy
  repository_dispatch:
    types: [smoke-test-trigger]

permissions:
  contents: write

jobs:
  smoke-test-release:
    name: Smoke Test and Release
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve dispatch payload
        id: payload
        run: |
          set -euo pipefail

          TAG=$(jq -r '.client_payload.tag // empty' "$GITHUB_EVENT_PATH")
          KIND=$(jq -r '.client_payload.release_kind // empty' "$GITHUB_EVENT_PATH")
          SOURCE_REPO=$(jq -r '.client_payload.source_repo // empty' "$GITHUB_EVENT_PATH")
          SOURCE_WORKFLOW=$(jq -r '.client_payload.source_workflow // empty' "$GITHUB_EVENT_PATH")
          SOURCE_RUN_ID=$(jq -r '.client_payload.source_run_id // empty' "$GITHUB_EVENT_PATH")
          SOURCE_RUN_URL=$(jq -r '.client_payload.source_run_url // empty' "$GITHUB_EVENT_PATH")
          SOURCE_SHA=$(jq -r '.client_payload.source_sha // empty' "$GITHUB_EVENT_PATH")
          CORRELATION_ID=$(jq -r '.client_payload.correlation_id // empty' "$GITHUB_EVENT_PATH")

          if [ -z "$TAG" ]; then
            echo "ERROR: repository_dispatch payload is missing client_payload.tag"
            exit 1
          fi

          if [ -z "$KIND" ]; then
            if echo "$TAG" | grep -qE -- '-rc[0-9]+$'; then
              KIND="candidate"
            else
              KIND="final"
            fi
          fi

          if [ "$KIND" != "candidate" ] && [ "$KIND" != "final" ]; then
            echo "ERROR: Invalid release_kind '$KIND' (expected candidate or final)"
            exit 1
          fi

          if [ -z "$SOURCE_RUN_URL" ] && [ -n "$SOURCE_REPO" ] && [ -n "$SOURCE_RUN_ID" ]; then
            SOURCE_RUN_URL="https://github.com/${SOURCE_REPO}/actions/runs/${SOURCE_RUN_ID}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_kind=$KIND" >> "$GITHUB_OUTPUT"
          echo "source_repo=$SOURCE_REPO" >> "$GITHUB_OUTPUT"
          echo "source_workflow=$SOURCE_WORKFLOW" >> "$GITHUB_OUTPUT"
          echo "source_run_id=$SOURCE_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "source_run_url=$SOURCE_RUN_URL" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "correlation_id=$CORRELATION_ID" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run smoke tests
        env:
          TAG: ${{ steps.payload.outputs.tag }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "ghcr.io/vig-os/devcontainer:${TAG}" \
            just test

      - name: Create downstream release note
        id: notes
        env:
          TAG: ${{ steps.payload.outputs.tag }}
          RELEASE_KIND: ${{ steps.payload.outputs.release_kind }}
          SOURCE_REPO: ${{ steps.payload.outputs.source_repo }}
          SOURCE_WORKFLOW: ${{ steps.payload.outputs.source_workflow }}
          SOURCE_RUN_ID: ${{ steps.payload.outputs.source_run_id }}
          SOURCE_RUN_URL: ${{ steps.payload.outputs.source_run_url }}
          SOURCE_SHA: ${{ steps.payload.outputs.source_sha }}
          CORRELATION_ID: ${{ steps.payload.outputs.correlation_id }}
        run: |
          set -euo pipefail
          cat > /tmp/smoke-test-release-notes.md <<EOF
          Smoke-test release automation for upstream tag \`$TAG\`.

          - release_kind: \`$RELEASE_KIND\`
          - source_repo: \`${SOURCE_REPO:-unknown}\`
          - source_workflow: \`${SOURCE_WORKFLOW:-unknown}\`
          - source_run_id: \`${SOURCE_RUN_ID:-unknown}\`
          - source_run_url: ${SOURCE_RUN_URL:-N/A}
          - source_sha: \`${SOURCE_SHA:-unknown}\`
          - correlation_id: \`${CORRELATION_ID:-unknown}\`
          EOF

      - name: Create GitHub release
        env:
          TAG: ${{ steps.payload.outputs.tag }}
          RELEASE_KIND: ${{ steps.payload.outputs.release_kind }}
        run: |
          set -euo pipefail

          if [ "$RELEASE_KIND" = "candidate" ]; then
            EXPECTED_PRERELEASE=true
          else
            EXPECTED_PRERELEASE=false
          fi

          EXISTING_RELEASE=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" 2>/dev/null || true)

          if [ -n "$EXISTING_RELEASE" ]; then
            EXISTING_PRERELEASE=$(echo "$EXISTING_RELEASE" | jq -r '.prerelease')
            if [ "$EXISTING_PRERELEASE" != "$EXPECTED_PRERELEASE" ]; then
              echo "ERROR: Existing release '$TAG' prerelease=$EXISTING_PRERELEASE (expected $EXPECTED_PRERELEASE)"
              exit 1
            fi

            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/smoke-test-release-notes.md
            echo "âś“ Existing release '$TAG' already matches expected kind; notes updated"
            exit 0
          fi

          if [ "$EXPECTED_PRERELEASE" = "true" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/smoke-test-release-notes.md \
              --prerelease
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/smoke-test-release-notes.md
          fi

      - name: Summary
        env:
          TAG: ${{ steps.payload.outputs.tag }}
          RELEASE_KIND: ${{ steps.payload.outputs.release_kind }}
        run: |
          echo "âś“ Smoke-test release created"
          echo "  Tag: $TAG"
          echo "  Kind: $RELEASE_KIND"
